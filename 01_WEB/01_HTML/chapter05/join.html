<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form method="post">
      <fieldset>
        <legend>회원가입</legend>
        <table>
          <tr>
            <td><label for="userId">사용자 ID</label></td>
            <td><input type="text" id="userId" name="Id" /></td>
          </tr>
          <tr>
            <td><label for="userPassword">비밀번호</label></td>
            <td><input type="password" id="userPassword" name="Password" /></td>
          </tr>
          <tr>
            <td><label for="userPasswordCheck">비밀번호 확인</label></td>
            <td>
              <input
                type="password"
                id="userPasswordCheck"
                name="PasswordCheck"
              />
            </td>
          </tr>
          <tr>
            <td><label for="username">이름</label></td>
            <td><input type="text" id="username" name="name" /></td>
          </tr>
          <tr>
            <td><label for="gender">성별</label></td>
            <td>
              <input type="radio" id="man" name="gender" value="m" />
              <label for="man">남</label>
              <input type="radio" id="woman" name="gender" value="w" />
              <label for="woamn">여</label>
            </td>
          </tr>
          <tr>
            <td><label for="hobby">취미</label></td>
            <td>
              <input type="checkbox" id="soccer" name="hobby" value="축구" />
              축구
              <input type="checkbox" id="baseball" name="hobby" value="야구" />
              야구
              <input
                type="checkbox"
                id="volleyball"
                name="hobby"
                value="배구"
              />
              배구
              <input
                type="checkbox"
                id="basketball"
                name="hobby"
                value="농구"
              />
              농구
            </td>
          </tr>
          <tr>
            <td><label for="userEmail">email</label></td>
            <td><input type="email" id="userEmail" name="email" /></td>
          </tr>
          <tr>
            <td><label for="manage">역할</label></td>
            <td>
              <select name="role">
                <option value="admin">ADMIN</option>
                <option value="management">관리자</option>
                <option value="person">일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="reset" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
