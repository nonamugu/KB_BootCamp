<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <button :style="[myColor, myLayout]">테스트</button>
      <script src="https://unpkg.com/vue"></script>
      <script>
        let vm = Vue.createApp({
          name: 'App',
          data() {
            return {
              myColor: {
                backgroundColor: 'purple',
                color: 'yellow',
              },
              myLayout: {
                width: '150px',
                height: '150px',
                textAlign: 'center',
              },
            };
          },
        }).mount('#app');
      </script>
    </div>
  </body>
</html>
